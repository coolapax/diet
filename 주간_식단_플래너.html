   dinner:{rice:'gul_bap',mains:['dak_gasmsal','dubu_gui'],soup:'cheonggukjang',sides:['miyeok_julgi','buchu_muchim','oi'],fruit:'gyul'}},
  // 9: 가자미+녹두전
  {lunch:{rice:'bam_bap',mains:['gajami_gui','nokdu_jeon'],soup:'hobak_guk',sides:['broccoli','kkaennip'],fruit:'dalgi'},
   snack:{items:['gyeran2','duyu','hodu_amo']},
   dinner:{rice:'bori_bap',mains:['samchi_jorim','gyeran3_mari'],soup:'gyeran_guk',sides:['chwi','parae','minari'],fruit:'sagwa'}},
];

// ===== STATE =====
let currentWeek = getWeekNum();
let weekPlan = [];

function getWeekNum(){
  const d=new Date(),y=new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-y)/864e5+y.getDay()+1)/7);
}
function getMonday(){
  const d=new Date(),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
  return new Date(d.setDate(diff));
}
function seed(w){let s=w*2654435761&0xFFFFFFFF;return function(){s^=s<<13;s^=s>>17;s^=s<<5;return(s>>>0)/4294967296}}

function generate(){
  currentWeek = getWeekNum();
  const rng = seed(currentWeek + new Date().getTime());
  buildPlan(rng);
  renderAll();
}
function generateFromWeek(){
  const rng = seed(currentWeek);
  buildPlan(rng);
  renderAll();
}

function buildPlan(rng){
  weekPlan=[];
  const used=new Set();
  for(let d=0;d<7;d++){
    let idx;
    let attempts=0;
    do{idx=Math.floor(rng()*TEMPLATES.length);attempts++}while(used.has(idx)&&attempts<20);
    if(used.size>=TEMPLATES.length)used.clear();
    used.add(idx);
    weekPlan.push(JSON.parse(JSON.stringify(TEMPLATES[idx])));
  }
}

function calcMeal(keys){
  let kcal=0,c=0,p=0,f=0;
  keys.forEach(k=>{if(R[k]){kcal+=R[k].kcal;c+=R[k].c;p+=R[k].p;f+=R[k].f}});
  return{kcal,c,p,f};
}
function dayKeys(plan){
  const k=[];
  if(plan.lunch.rice)k.push(plan.lunch.rice);
  plan.lunch.mains.forEach(m=>k.push(m));
  if(plan.lunch.soup)k.push(plan.lunch.soup);
  plan.lunch.sides.forEach(s=>k.push(s));
  if(plan.lunch.fruit)k.push(plan.lunch.fruit);
  plan.snack.items.forEach(i=>k.push(i));
  if(plan.dinner.rice)k.push(plan.dinner.rice);
  plan.dinner.mains.forEach(m=>k.push(m));
  if(plan.dinner.soup)k.push(plan.dinner.soup);
  plan.dinner.sides.forEach(s=>k.push(s));
  if(plan.dinner.fruit)k.push(plan.dinner.fruit);
  return k;
}

const DAYS=['월','화','수','목','금','토','일'];
function renderAll(){
  // Week label
  const mon=getMonday();
  const sun=new Date(mon);sun.setDate(sun.getDate()+6);
  document.getElementById('weekLabel').textContent=new Date().getFullYear()+'년 '+currentWeek+'주차';
  document.getElementById('weekDate').textContent=(mon.getMonth()+1)+'/'+mon.getDate()+' ~ '+(sun.getMonth()+1)+'/'+sun.getDate();

  // Tabs
  let tabH='';
  const dates=[];
  for(let i=0;i<7;i++){
    const dt=new Date(mon);dt.setDate(dt.getDate()+i);dates.push(dt);
    tabH+=`<button class="dtab${i===0?' active':''}" onclick="showDayTab(${i})">${DAYS[i]}<span class="dow">${dt.getMonth()+1}/${dt.getDate()}</span></button>`;
  }
  document.getElementById('tabRow').innerHTML=tabH;

  // Day panels
  let panH='';
  weekPlan.forEach((plan,i)=>{
    const keys=dayKeys(plan);
    const tot=calcMeal(keys);
    panH+=`<div class="day-wrap${i===0?' active':''}" id="dpan-${i}">`;
    panH+=`<div class="day-head"><div class="day-kcal">${tot.kcal} kcal</div><div class="day-macro">탄${tot.c}g · 단${tot.p}g · 지${tot.f}g</div></div>`;

    // Lunch
    const lk=[plan.lunch.rice,...plan.lunch.mains,plan.lunch.soup,...plan.lunch.sides,plan.lunch.fruit].filter(Boolean);
    const lm=calcMeal(lk);
    panH+=`<div class="meal-card"><div class="meal-head bg-lunch"><span>🍽️ 점심 11~12시</span><span class="meal-kcal-badge">${lm.kcal}kcal</span></div>`;
    lk.forEach(k=>{const r=R[k];if(r)panH+=foodRow(k,r)});
    panH+=`</div>`;

    // Snack
    const sk=plan.snack.items;
    const sm=calcMeal(sk);
    panH+=`<div class="meal-card"><div class="meal-head bg-snack"><span>🥜 간식 2~3시</span><span class="meal-kcal-badge">${sm.kcal}kcal</span></div>`;
    sk.forEach(k=>{const r=R[k];if(r)panH+=foodRow(k,r)});
    panH+=`</div>`;

    // Dinner
    const dk=[plan.dinner.rice,...plan.dinner.mains,plan.dinner.soup,...plan.dinner.sides,plan.dinner.fruit].filter(Boolean);
    const dm=calcMeal(dk);
    panH+=`<div class="meal-card"><div class="meal-head bg-dinner"><span>🌙 저녁 5~6시</span><span class="meal-kcal-badge">${dm.kcal}kcal</span></div>`;
    dk.forEach(k=>{const r=R[k];if(r)panH+=foodRow(k,r)});
    panH+=`</div>`;

    panH+=`</div>`;
  });
  document.getElementById('dayPanels').innerHTML=panH;

  // Touch events
  document.querySelectorAll('.dtab').forEach(b=>{
    b.addEventListener('touchend',function(e){e.preventDefault();this.click()},{passive:false});
  });
}

function foodRow(key,r){
  return`<div class="food-row" onclick="openRecipe('${key}')"><div class="food-emoji">${r.emoji}</div><div class="food-info"><div class="food-name">${r.name}</div><div class="food-amt">${r.sv||''}</div></div><div class="food-kcal">${r.kcal}</div></div>`;
}

function showDayTab(i){
  document.querySelectorAll('.dtab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.day-wrap').forEach((p,j)=>p.classList.toggle('active',j===i));
}

// ===== RECIPE MODAL =====
function openRecipe(key){
  const r=R[key];if(!r)return;
  let h=`<div class="modal-top"><div class="modal-emoji">${r.emoji}</div><div class="modal-name">${r.name}</div><div class="modal-sub">⏱️ ${r.time}${r.sv?' · 📏 '+r.sv:''}</div></div>`;
  h+=`<div class="modal-macros"><div class="modal-macro m-kcal"><div class="val">${r.kcal}</div><div class="lbl">kcal</div></div><div class="modal-macro m-carb"><div class="val">${r.c}g</div><div class="lbl">탄수</div></div><div class="modal-macro m-prot"><div class="val">${r.p}g</div><div class="lbl">단백</div></div><div class="modal-macro m-fat"><div class="val">${r.f}g</div><div class="lbl">지방</div></div></div>`;
  h+=`<div class="modal-section"><h3>재료</h3>`;
  r.ing.forEach(i=>{
    const cc=i.c==='①'?'ic1':i.c==='⑥'?'ic6':(i.c==="⑥'"?'ic6p':'');
    h+=`<div class="ing-row"><span>${i.n}${i.c?'<span class="ing-cat '+cc+'">'+i.c+'</span>':''}</span><span style="color:#999">${i.a}</span></div>`;
  });
  h+=`</div><div class="modal-section"><h3>조리법</h3>`;
  r.steps.forEach((s,j)=>{h+=`<div class="step"><div class="step-num">${j+1}</div><div>${s}</div></div>`});
  h+=`</div><div class="modal-close"><button class="btn" onclick="closeRecipe()">닫기</button></div>`;
  document.getElementById('recipeContent').innerHTML=h;
  document.getElementById('recipeModal').classList.add('active');
  document.body.style.overflow='hidden';
}
function closeRecipe(){
  document.getElementById('recipeModal').classList.remove('active');
  document.body.style.overflow='';
}

// ===== SHOPPING LIST =====
function openShop(){
  const allIngs={};
  weekPlan.forEach(plan=>{
    const keys=dayKeys(plan);
    keys.forEach(k=>{
      const r=R[k];if(!r)return;
      r.ing.forEach(i=>{
        if(!i.n||i.n==='물')return;
        if(!allIngs[i.n])allIngs[i.n]={cat:i.c,count:0};
        allIngs[i.n].count++;
      });
    });
  });

  const cats={'①':[],'⑥':[],"⑥'":[],'':[]};
  Object.keys(allIngs).forEach(n=>{
    const c=allIngs[n].cat;
    if(cats[c])cats[c].push({n,count:allIngs[n].count});
    else cats[''].push({n,count:allIngs[n].count});
  });

  let h=`<div class="shop-head"><h2>🛒 이번 주 장보기 리스트</h2><p>${Object.keys(allIngs).length}가지 식재료</p></div>`;
  const labels={'①':'① 카테고리','⑥':'⑥ 카테고리',"⑥'":"⑥' 카테고리",'':'기타/양념'};
  const emojis={'①':'🟢','⑥':'🔵',"⑥'":'🟣','':'⚪'};
  Object.keys(cats).forEach(c=>{
    if(cats[c].length===0)return;
    cats[c].sort((a,b)=>b.count-a.count);
    h+=`<div class="shop-cat"><div class="shop-cat-label">${emojis[c]} ${labels[c]} (${cats[c].length})</div><div class="shop-items">`;
    cats[c].forEach(item=>{
      h+=`<label class="shop-item"><input type="checkbox"> ${item.n}${item.count>3?' <b>(자주)</b>':''}</label>`;
    });
    h+=`</div></div>`;
  });
  h+=`<div class="modal-close"><button class="btn" onclick="closeShop()">닫기</button></div>`;
  document.getElementById('shopContent').innerHTML=h;
  document.getElementById('shopModal').classList.add('active');
  document.body.style.overflow='hidden';
}
function closeShop(){
  document.getElementById('shopModal').classList.remove('active');
  document.body.style.overflow='';
}

// ===== INIT =====
generateFromWeek();
</script>
